name: Daily TIL Log
on:
  repository_dispatch:
    types: [notion_push]

jobs:
  log_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Append to history.md
        run: |
          export TZ="Asia/Tokyo"
          DATE=$(date +'%Y-%m-%d %H:%M:%S')
          CONTENT="${{ github.event.client_payload.content }}"
          
          # 最新の状態を取り込む設定を追加
          git config user.name "mmgggg"
          git config user.email "あなたのメールアドレス"
          
          # Pushする前に一度Pullして、変更を合流させる（ここが重要！）
          git pull origin main --rebase
          
          echo "- ${DATE} | ${CONTENT}" >> history.md
          
          git add history.md
          git commit -m "Update TIL: ${DATE}"
          git push